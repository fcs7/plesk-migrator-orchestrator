# Plesk Migrator Orchestrator — template de configuração
# Após editar: chmod 600 /etc/plesk-migration.yaml (contém senha em texto plano)

# -----------------------------------------------------------------------------
# Origem cPanel/WHM
# -----------------------------------------------------------------------------
source:
  host: 192.0.2.10              # IP/hostname do servidor cPanel
  ssh_port: 22                  # opcional (default 22)
  ssh_password: "TROQUE_AQUI"   # senha root cPanel — SENSÍVEL, não commitar
  postgres_password: null       # opcional; preencha se origem tem PostgreSQL

# -----------------------------------------------------------------------------
# Destino Plesk (este servidor — onde o orquestrador roda)
# -----------------------------------------------------------------------------
dest:
  host: 192.0.2.20              # IP/hostname do servidor Plesk Obsidian

# -----------------------------------------------------------------------------
# Filtros de migração (DESABILITADO nesta versão)
# -----------------------------------------------------------------------------
# Filtragem local de migration-list está desabilitada: o arquivo gerado por
# `plesk-migrator generate-migration-list` contém objetos estruturados
# (resellers, customers, plans, domínios) e um filtro por linha pode corromper
# a hierarquia. Para limitar escopo:
#   1) Rode --only-phase list, edite manualmente a migration-list, depois
#      continue com --only-phase preflight em diante; OU
#   2) Use a flag nativa --migration-list-file do plesk-migrator.
# As chaves abaixo continuam validadas (apenas para alertar): listas
# não-vazias provocam ValidationError antes do pipeline rodar.
migration:
  allowlist: []
  denylist:  []
  # Map opcional usado por sanitize-list. Default DEFAULT_RESERVED_RENAME em
  # plesk_migrator_orchestrator.py: webmail→correio, mail→email, etc.
  # Sobrescreva pra adaptar à convenção do cliente. NÃO ativa rename — flag
  # --rename-reserved-subdomains OU behavior.rename_reserved_subdomains=true.
  reserved_renames: {}
  # Tentativas máximas de retransfer-failed antes de abortar. CLI:
  # --max-retransfer-attempts N. Default 3.
  max_retransfer_attempts: 3

# -----------------------------------------------------------------------------
# Paths (auto-discovery resolve nos locais canônicos do Plesk)
# -----------------------------------------------------------------------------
# O orquestrador procura cada binário em locais conhecidos
# (/usr/local/psa/bin, /opt/psa/bin, /usr/sbin) e no $PATH. Só sobrescreva
# se seu host instalou o Plesk fora do padrão.
#
# conf_dir, sessions_dir e session_name NÃO podem ser sobrescritos: o
# plesk-migrator lê config.ini e escreve sessões em paths fixos relativos
# ao diretório do módulo panel-migrator. Qualquer override criaria mismatch.
paths:
  plesk_bin: null               # default: auto-discover (plesk binary)
  plesk_extension_bin: null     # default: auto-discover (extension binary)
  plesk_migrator_bin: null      # default: auto-discover; resolvido após install
  log_dir: /var/log/plesk-migration-orchestrator

# -----------------------------------------------------------------------------
# Comportamento (flags CLI sobrescrevem)
# -----------------------------------------------------------------------------
behavior:
  dry_run: false                # --dry-run
  skip_install: false           # --skip-install
  force_regenerate: false       # --force-regenerate (sobrescreve migration-list)
  cleanup_config: false         # --cleanup-config (apaga config.ini ao final)
  skip:
    web_content: false          # --skip-web-content
    mail_content: false         # --skip-mail-content
    db_content: false           # --skip-db-content
    fix_docroot: false          # --skip-fix-docroot
    fix_mailpath: false         # --skip-fix-mailpath
    check_mail_passwords: false # --skip-check-mail-passwords
    sanitize_list: false        # --skip-sanitize-list
    fix_limits: false           # --skip-fix-limits
    retransfer_failed: false    # --skip-retransfer-failed
    fix_mail_quota: false       # --skip-fix-mail-quota
    fix_ftp_renames: false      # --skip-fix-ftp-renames
    fix_ftp_passwords: false    # --skip-fix-ftp-passwords
    fix_dns_conflicts: false    # --skip-fix-dns-conflicts
    fix_owner: false            # --skip-fix-owner
  # Opt-ins (default OFF — efeito sobre estado/cliente)
  apply_owner_fix: false             # --apply-owner-fix (cria customers + reassign subscriptions)
  rename_reserved_subdomains: false  # --rename-reserved-subdomains
  apply_dns_cleanup: false           # --apply-dns-cleanup
  apply_mailpath_fix: false          # --apply-mailpath-fix
  reset_mail_passwords: false        # --reset-mail-passwords
  reset_ftp_passwords: false         # --reset-ftp-passwords
